<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="diffing">
  <defs>
    <linearGradient id="bg" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5E81AC"/>
      <stop offset="0.55" stop-color="#88C0D0"/>
      <stop offset="1" stop-color="#B48EAD"/>
    </linearGradient>
    <linearGradient id="shine" x1="8" y1="4" x2="24" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#2E3440" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Soft rounded app tile -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="9" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="9" fill="url(#shine)"/>

  <!-- Two cute overlapping diff panes -->
  <g filter="url(#soft)">
    <!-- Left pane (additions) -->
    <rect x="6" y="8" width="11.5" height="16" rx="3.5" fill="#ECEFF4" fill-opacity="0.95"/>
    <rect x="6" y="8" width="11.5" height="16" rx="3.5" fill="#A3BE8C" fill-opacity="0.18"/>
    <!-- Right pane (deletions), slightly overlapping -->
    <rect x="14.5" y="8" width="11.5" height="16" rx="3.5" fill="#ECEFF4" fill-opacity="0.95"/>
    <rect x="14.5" y="8" width="11.5" height="16" rx="3.5" fill="#BF616A" fill-opacity="0.16"/>
  </g>

  <!-- Friendly + on left -->
  <path d="M11.75 12.2v3.1h3.1v1.7h-3.1v3.1h-1.7v-3.1h-3.1v-1.7h3.1v-3.1z"
        fill="#5E8A4A" fill-opacity="0.95"/>
  <!-- Friendly − on right -->
  <rect x="17.2" y="15.15" width="6.1" height="1.7" rx="0.85" fill="#A34B54"/>

  <!-- Tiny sparkle for adorableness -->
  <circle cx="25.2" cy="6.8" r="1.15" fill="#ECEFF4" fill-opacity="0.9"/>
  <circle cx="6.6" cy="25.4" r="0.75" fill="#ECEFF4" fill-opacity="0.55"/>
</svg>
